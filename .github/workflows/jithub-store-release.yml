name: Publish JitHub to Microsoft Store

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Four-part Store package version (for example 1.6.5.0)
        required: true
        type: string
      editor_assets_ref:
        description: jithub-vs-code ref to build for artifacts\EditorAssets\dist
        required: false
        default: master
        type: string
      allow_winui_store_release:
        description: Temporary override for the in-progress WinUI migration. Leave false until WinUI reaches full feature parity.
        required: false
        default: false
        type: boolean
      use_signing_certificate:
        description: Sign the package with the configured PFX before Store upload. Leave false to match the existing Store-upload flow where Partner Center re-signs the submitted package.
        required: false
        default: false
        type: boolean
      store_submission_mode:
        description: Whether msstore should publish publicly, keep a draft submission, or publish to a flight.
        required: false
        default: public
        type: choice
        options:
          - public
          - draft
          - flight
      store_flight_id:
        description: Partner Center flight ID. Required when store_submission_mode is flight.
        required: false
        type: string
      package_rollout_percentage:
        description: Optional staged rollout percentage from 0 to 100.
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-store:
    name: Build and publish to Store
    runs-on: windows-latest
    timeout-minutes: 90
    environment: microsoft-store
    env:
      PROJECT_PATH: 'JitHub.WinUI\JitHub.WinUI.csproj'
      PROJECT_ROOT: JitHub.WinUI
      MANIFEST_PATH: 'JitHub.WinUI\Package.appxmanifest'
      APP_PACKAGES_DIR: '${{ github.workspace }}\artifacts\AppPackages\'
      APP_DISPLAY_NAME: ${{ vars.STORE_APP_DISPLAY_NAME }}
      BUNDLE_PLATFORMS: ${{ vars.JITHUB_STORE_BUNDLE_PLATFORMS }}
      PUBLISHER_DISPLAY_NAME: ${{ vars.STORE_PUBLISHER_DISPLAY_NAME }}
      TARGET_PLATFORM_VERSION: 10.0.26100.0
      STORE_CLIENT_ID: ${{ secrets.STORE_CLIENT_ID }}
      STORE_CLIENT_SECRET: ${{ secrets.STORE_CLIENT_SECRET }}
      STORE_PACKAGE_CERTIFICATE_BASE64: ${{ secrets.STORE_PACKAGE_CERTIFICATE_BASE64 }}
      STORE_PACKAGE_CERTIFICATE_PASSWORD: ${{ secrets.STORE_PACKAGE_CERTIFICATE_PASSWORD }}
      STORE_PACKAGE_CERTIFICATE_THUMBPRINT: ${{ secrets.STORE_PACKAGE_CERTIFICATE_THUMBPRINT }}
      STORE_PACKAGE_IDENTITY_NAME: ${{ secrets.STORE_PACKAGE_IDENTITY_NAME }}
      STORE_PACKAGE_PUBLISHER: ${{ secrets.STORE_PACKAGE_PUBLISHER }}
      STORE_PHONE_PRODUCT_ID: ${{ secrets.STORE_PHONE_PRODUCT_ID }}
      STORE_PHONE_PUBLISHER_ID: ${{ secrets.STORE_PHONE_PUBLISHER_ID }}
      STORE_PRODUCT_ID: ${{ secrets.STORE_PRODUCT_ID }}
      STORE_SELLER_ID: ${{ secrets.STORE_SELLER_ID }}
      STORE_TENANT_ID: ${{ secrets.STORE_TENANT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout jithub-vs-code
        uses: actions/checkout@v4
        with:
          repository: nerocui/jithub-vs-code
          ref: ${{ inputs.editor_assets_ref }}
          path: editor-assets

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: editor-assets/yarn.lock

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - name: Install editor asset dependencies
        working-directory: editor-assets
        shell: pwsh
        run: yarn --frozen-lockfile

      - name: Set up Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.3

      - name: Verify Microsoft Store CLI
        shell: pwsh
        run: msstore --help

      - name: Build editor assets
        shell: pwsh
        run: >
          .\eng\Sync-JitHubVsCodeAssets.ps1
          -VsCodeRepoPath "${{ github.workspace }}\editor-assets"
          -DestinationPath "${{ github.workspace }}\artifacts\EditorAssets\dist"
          -SkipInstall

      - name: Patch Store manifest values
        shell: pwsh
        run: >
          .\eng\Prepare-JitHubStoreRelease.ps1
          -ManifestPath "${{ env.MANIFEST_PATH }}"
          -Version "${{ inputs.release_version }}"
          -PackageIdentityName "$env:STORE_PACKAGE_IDENTITY_NAME"
          -PackagePublisher "$env:STORE_PACKAGE_PUBLISHER"
          -PublisherDisplayName "$env:PUBLISHER_DISPLAY_NAME"
          -AppDisplayName "$env:APP_DISPLAY_NAME"
          -PhoneProductId "$env:STORE_PHONE_PRODUCT_ID"
          -PhonePublisherId "$env:STORE_PHONE_PUBLISHER_ID"

      - name: Verify Windows SDK availability
        shell: pwsh
        run: |
          $sdkPath = Join-Path "${env:ProgramFiles(x86)}\Windows Kits\10\Include" $env:TARGET_PLATFORM_VERSION
          if (-not (Test-Path -LiteralPath $sdkPath)) {
            $availableSdks = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Directory |
              Sort-Object Name |
              Select-Object -ExpandProperty Name

            throw "Required Windows SDK $env:TARGET_PLATFORM_VERSION was not found. Available SDKs: $($availableSdks -join ', ')"
          }

      - name: Block WinUI Store publish until migration exit conditions are met
        if: ${{ !inputs.allow_winui_store_release }}
        shell: pwsh
        run: |
          throw "WinUI Store publishing is intentionally blocked until the migration reaches full feature parity. Leave allow_winui_store_release=false until that exit condition is met."

      - name: Build Store upload package
        id: build-package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projectPath = Join-Path $env:GITHUB_WORKSPACE $env:PROJECT_PATH
          $packageDir = $env:APP_PACKAGES_DIR
          $bundlePlatforms = if ([string]::IsNullOrWhiteSpace($env:BUNDLE_PLATFORMS)) { 'x64' } else { $env:BUNDLE_PLATFORMS }

          .\eng\Build-JitHubWinUIStorePackage.ps1 `
            -ProjectPath $projectPath `
            -OutputDirectory $packageDir `
            -BundlePlatforms $bundlePlatforms `
            -TargetPlatformVersion $env:TARGET_PLATFORM_VERSION `
            -UseSigningCertificate:("${{ inputs.use_signing_certificate }}" -eq 'true') `
            -PackageCertificateBase64 $env:STORE_PACKAGE_CERTIFICATE_BASE64 `
            -PackageCertificatePassword $env:STORE_PACKAGE_CERTIFICATE_PASSWORD `
            -PackageCertificateThumbprint $env:STORE_PACKAGE_CERTIFICATE_THUMBPRINT

      - name: Remove transient signing certificate
        if: always()
        shell: pwsh
        run: |
          $candidatePaths = @()
          if (-not [string]::IsNullOrWhiteSpace($env:RUNNER_TEMP)) {
            $candidatePaths += Join-Path $env:RUNNER_TEMP 'JitHub-WinUI-StorePackage.pfx'
          }

          if (-not [string]::IsNullOrWhiteSpace($env:TEMP)) {
            $candidatePaths += Join-Path $env:TEMP 'JitHub-WinUI-StorePackage.pfx'
          }

          $candidatePaths = $candidatePaths | Select-Object -Unique

          foreach ($candidatePath in $candidatePaths) {
            if (Test-Path -LiteralPath $candidatePath) {
              Remove-Item -LiteralPath $candidatePath -Force
            }
          }

      - name: Find Store upload package
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $package = Get-ChildItem -Path $env:APP_PACKAGES_DIR -Recurse -File |
            Where-Object { $_.Extension -in '.appxupload', '.msixupload' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $package) {
            throw "No .appxupload or .msixupload file was found under $env:APP_PACKAGES_DIR"
          }

          "upload_package=$($package.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "upload_package_dir=$($package.DirectoryName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jithub-store-package-${{ inputs.release_version }}
          path: ${{ env.APP_PACKAGES_DIR }}
          if-no-files-found: error

      - name: Configure Store credentials
        shell: pwsh
        run: >
          msstore reconfigure
          --tenantId "$env:STORE_TENANT_ID"
          --sellerId "$env:STORE_SELLER_ID"
          --clientId "$env:STORE_CLIENT_ID"
          --clientSecret "$env:STORE_CLIENT_SECRET"

      - name: Publish package to Microsoft Store
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $submissionMode = '${{ inputs.store_submission_mode }}'
          $flightId = '${{ inputs.store_flight_id }}'
          $rolloutPercentage = '${{ inputs.package_rollout_percentage }}'

          if ($submissionMode -eq 'flight' -and [string]::IsNullOrWhiteSpace($flightId)) {
            throw 'store_flight_id is required when store_submission_mode is flight.'
          }

          $publishArgs = @(
            'publish',
            "${{ github.workspace }}\${{ env.PROJECT_ROOT }}",
            '--inputFile',
            '${{ steps.package.outputs.upload_package }}',
            '--appId',
            "$env:STORE_PRODUCT_ID"
          )

          if ($submissionMode -eq 'draft') {
            $publishArgs += '--noCommit'
          }

          if ($submissionMode -eq 'flight') {
            $publishArgs += '--flightId'
            $publishArgs += $flightId
          }

          if (-not [string]::IsNullOrWhiteSpace($rolloutPercentage)) {
            $parsedRolloutPercentage = 0
            if (-not [int]::TryParse($rolloutPercentage, [ref]$parsedRolloutPercentage) -or $parsedRolloutPercentage -lt 0 -or $parsedRolloutPercentage -gt 100) {
              throw 'package_rollout_percentage must be an integer from 0 to 100.'
            }

            $publishArgs += '--packageRolloutPercentage'
            $publishArgs += $parsedRolloutPercentage.ToString()
          }

          & msstore @publishArgs
          if ($LASTEXITCODE -ne 0) {
            throw 'msstore publish failed.'
          }

