name: Windows App CLI smoke

on:
  workflow_dispatch:
    inputs:
      verify_debug_build:
        description: Build JitHub.WinUI after installing winapp.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  winapp-cli-smoke:
    name: Verify Windows App CLI integration
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - name: Set up Windows App CLI
        uses: microsoft/setup-WinAppCli@v0.1

      - name: Verify Windows App CLI command surface
        shell: pwsh
        run: |
          winapp --help
          winapp create-debug-identity --help
          winapp ui --help

      - name: Build WinUI debug app
        if: ${{ inputs.verify_debug_build }}
        shell: pwsh
        run: dotnet build .\JitHub.WinUI\JitHub.WinUI.csproj -c Debug -p:Platform=x64
